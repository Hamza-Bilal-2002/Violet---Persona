# Persona Avatar — backend stack.
#
# This is the separable backend unit: every server-side service lives
# under server/ and is reachable only over the network (HTTP/WS). The
# client (client/electron + client/frontend) runs outside compose and
# talks to these services via CORS-allowed WebSocket/HTTP.
#
# `name:` pins the compose project so the named volumes (persona_data,
# whisper_cache) stay stable regardless of the parent directory — a
# requirement for the backend being relocatable on its own.

name: persona

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: persona_api
    ports:
      - "8000:8000"
    env_file:
      - ./api/.env
    environment:
      # Container-to-container URL for the embedding sibling. Overrides
      # the localhost default in Settings so the api reaches embed on
      # the compose network.
      - EMBED_URL=http://embed:8005
    depends_on:
      - embed
    volumes:
      # mount source for live reload during dev. remove for prod.
      - ./api:/app
      # single source of truth for agent identity (name, personality,
      # user-facing strings). read-only so the backend treats it as
      # immutable config, not data.
      - ./config:/app/config:ro
      # Phase 4 Wave 4.3: persistent conversation store. SQLite DB
      # lives at /data/violet.db — survives rebuilds via the named
      # volume so Violet keeps her memory of you across container
      # restarts.
      - persona_data:/data
    restart: unless-stopped
    networks:
      - persona_net

  # Phase 2.B — speech-to-text sibling. Whisper "tiny" int8 on CPU,
  # wrapped behind a tiny FastAPI shim. The renderer's MediaRecorder
  # POSTs WebM/Opus blobs to /transcribe and we hand the transcript
  # to the api service via the existing /chat/ws path (in-renderer
  # plumbing, not container-to-container — the api never sees us).
  speech:
    build:
      context: ./speech
      dockerfile: Dockerfile
    container_name: persona_speech
    ports:
      - "8002:8002"
    volumes:
      # live reload during dev. remove for prod.
      - ./speech:/app
      # Persist the Whisper model cache across rebuilds. Without
      # this, every `docker compose build --no-cache` would re-
      # download the ~75MB weights at first /transcribe call.
      - whisper_cache:/root/.cache/huggingface
    restart: unless-stopped
    networks:
      - persona_net

  # Phase 2.B Wave 2 — wake-word sibling. openwakeword ONNX models
  # run on CPU. The renderer streams 16 kHz mono Int16 PCM into the
  # /ws endpoint continuously; the container emits a JSON event
  # whenever a keyword scores above the detection threshold. Picovoice
  # Porcupine would have been the obvious pick but their personal-
  # account access went away in late 2024.
  wake:
    build:
      context: ./wake
      dockerfile: Dockerfile
    container_name: persona_wake
    ports:
      - "8003:8003"
    volumes:
      # live reload during dev. remove for prod.
      - ./wake:/app
    restart: unless-stopped
    networks:
      - persona_net

  # Phase 4 Wave 4.2 — neural TTS sibling. Piper (ONNX) replaces the
  # browser SpeechSynthesisUtterance pipeline. POST /synthesize
  # returns WAV bytes which the renderer plays through an
  # HTMLAudioElement; LipSyncManager's audio-analyser path takes
  # over from there. Voice model (en_US-amy-medium) is baked into
  # the image at build time so first call doesn't stall.
  tts:
    build:
      context: ./tts
      dockerfile: Dockerfile
    container_name: persona_tts
    ports:
      - "8004:8004"
    volumes:
      # live reload during dev. remove for prod.
      - ./tts:/app
    restart: unless-stopped
    networks:
      - persona_net

  # Local embedding sibling — fastembed (bge-small-en-v1.5, ONNX/CPU).
  # Turns text into 384-dim vectors for the api's long-term memory
  # store. Called container-to-container (http://embed:8005), never by
  # the renderer, so no host port mapping is strictly required — but we
  # expose 8005 anyway for debugging. Model is baked into the image at
  # build time so the first /embed call doesn't stall.
  embed:
    build:
      context: ./embed
      dockerfile: Dockerfile
    container_name: persona_embed
    ports:
      - "8005:8005"
    volumes:
      # live reload during dev. remove for prod. (/models is baked into
      # the image and not shadowed by this mount.)
      - ./embed:/app
    restart: unless-stopped
    networks:
      - persona_net

  # Local LLM (Ollama) — the primary model in production. Gated behind
  # the 'local' compose profile so it only starts when Hamza is at his
  # PC: `docker compose --profile local up -d`. Without it, the api's
  # LLM_PROVIDER=auto probes http://ollama:11434 (no answer) and falls
  # back to GPT — so the stack runs fine today with no local model.
  #
  # First time on the PC, pull the model into the running container:
  #   docker compose --profile local exec ollama ollama pull llama3
  # (or the GGUF tag you're using), then set LOCAL_LLM_MODEL to match.
  ollama:
    image: ollama/ollama:latest
    container_name: persona_ollama
    profiles: ["local"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped
    networks:
      - persona_net
    # GPU passthrough — Linux/NVIDIA only. On Windows with AMD,
    # run Ollama natively instead (see LOCAL_LLM_URL in api/.env).
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

networks:
  persona_net:
    driver: bridge

volumes:
  whisper_cache:
  persona_data:
  ollama_models:

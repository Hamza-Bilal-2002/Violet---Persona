<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Memory</title>
<style>
  :root {
    --bg: #0d0d0f;
    --panel: rgba(255,255,255,0.035);
    --panel-hover: rgba(255,255,255,0.06);
    --border: rgba(255,255,255,0.08);
    --text: rgba(255,255,255,0.92);
    --muted: rgba(255,255,255,0.4);
    --faint: rgba(255,255,255,0.22);
    --amber: #ffc83c;
    --user: #ffc83c;
    --feedback: #5aa9ff;
    --project: #4ade80;
    --reference: #c084fc;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
    font-size: 13px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  /* Title bar (frameless drag region) */
  .titlebar {
    -webkit-app-region: drag;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .titlebar h1 {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .titlebar .count {
    font-size: 11px;
    color: var(--faint);
    font-weight: 500;
  }
  .spacer { flex: 1; }
  .x {
    -webkit-app-region: no-drag;
    width: 22px; height: 22px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted);
    cursor: pointer;
    font-size: 15px;
    line-height: 1;
  }
  .x:hover { background: rgba(255,80,80,0.18); color: #ff8080; }

  /* Tabs — Memories / Scheduled */
  .tabs {
    display: flex;
    gap: 2px;
    padding: 0 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .tab {
    -webkit-app-region: no-drag;
    position: relative;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.02em;
    padding: 9px 4px 10px;
    margin-right: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); }
  .tab.active::after {
    content: '';
    position: absolute;
    left: 0; right: 0; bottom: -1px;
    height: 2px;
    border-radius: 2px;
    background: var(--amber);
  }
  .tab .tcount {
    font-size: 10px;
    font-weight: 600;
    color: var(--faint);
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 0 6px;
    min-width: 16px;
    text-align: center;
  }
  .tab.active .tcount { color: var(--muted); }

  /* Search */
  .toolbar {
    padding: 10px 14px;
    flex-shrink: 0;
  }
  .search {
    -webkit-app-region: no-drag;
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 8px 11px;
    color: var(--text);
    font-size: 13px;
    outline: none;
  }
  .search:focus { border-color: rgba(255,200,60,0.4); }
  .search::placeholder { color: var(--faint); }

  /* List */
  .list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 10px 10px;
  }
  .list::-webkit-scrollbar { width: 8px; }
  .list::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.1);
    border-radius: 4px;
  }

  .empty {
    text-align: center;
    color: var(--faint);
    padding: 48px 24px;
    font-size: 12px;
    line-height: 1.6;
  }

  .item {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 9px 10px;
    margin: 6px 4px;
    transition: background 0.12s, border-color 0.12s;
  }
  .item:hover { background: var(--panel-hover); }

  .rail { width: 3px; align-self: stretch; border-radius: 2px; flex-shrink: 0; }

  .body { flex: 1; min-width: 0; }
  .content {
    -webkit-app-region: no-drag;
    font-size: 13px;
    line-height: 1.45;
    color: var(--text);
    outline: none;
    border-radius: 5px;
    padding: 1px 3px;
    user-select: text;
    word-break: break-word;
  }
  .content:focus {
    background: rgba(255,200,60,0.08);
    box-shadow: 0 0 0 1px rgba(255,200,60,0.3);
  }
  .meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 6px;
  }
  select.type {
    -webkit-app-region: no-drag;
    background: rgba(0,0,0,0.3);
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    padding: 2px 4px;
    outline: none;
    cursor: pointer;
  }
  .imp {
    display: flex;
    gap: 2px;
    align-items: center;
  }
  .pip { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.15); }
  .pip.on { background: var(--muted); }
  .src {
    font-size: 9px;
    color: var(--faint);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .del {
    -webkit-app-region: no-drag;
    color: var(--faint);
    cursor: pointer;
    font-size: 14px;
    padding: 2px 4px;
    border-radius: 5px;
    flex-shrink: 0;
    line-height: 1;
  }
  .del:hover { color: #ff8080; background: rgba(255,80,80,0.14); }

  /* Scheduled-task rows */
  .ev-title {
    font-size: 13px;
    line-height: 1.4;
    color: var(--text);
    word-break: break-word;
  }
  .ev-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 5px;
  }
  .kind {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    border-radius: 5px;
    padding: 2px 6px;
  }
  .kind.event    { color: var(--feedback); background: rgba(90,169,255,0.13); }
  .kind.reminder { color: var(--amber);    background: rgba(255,200,60,0.13); }
  .ev-when {
    font-size: 11px;
    color: var(--muted);
  }
  .ev-when .in {
    color: var(--faint);
    margin-left: 6px;
  }

  /* Footer */
  .footer {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .btn {
    -webkit-app-region: no-drag;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-size: 12px;
    padding: 6px 12px;
    cursor: pointer;
  }
  .btn:hover { background: var(--panel-hover); color: var(--text); }
  .btn.danger:hover { background: rgba(255,80,80,0.16); color: #ff8080; border-color: rgba(255,80,80,0.3); }
  .saved {
    font-size: 11px;
    color: var(--project);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .saved.show { opacity: 1; }
</style>
</head>
<body>
  <div class="titlebar">
    <h1>Violet's Memory</h1>
    <span class="count" id="count"></span>
    <span class="spacer"></span>
    <span class="saved" id="saved">saved</span>
    <div class="x" id="close" title="Close">✕</div>
  </div>

  <div class="tabs">
    <button class="tab active" id="tabMem" data-tab="memories">
      Memories <span class="tcount" id="cMem"></span>
    </button>
    <button class="tab" id="tabSched" data-tab="scheduled">
      Scheduled <span class="tcount" id="cSched"></span>
    </button>
  </div>

  <div class="toolbar" id="toolbar">
    <input class="search" id="search" type="text"
           placeholder="Search memories…  (semantic)">
  </div>

  <div class="list" id="list"></div>

  <div class="footer">
    <button class="btn" id="refresh">Refresh</button>
    <span class="spacer" style="flex:1"></span>
    <button class="btn danger" id="reset">Reset all</button>
  </div>

<script>
  const TYPES = ['user', 'feedback', 'project', 'reference'];
  const COLOR = {
    user: 'var(--user)', feedback: 'var(--feedback)',
    project: 'var(--project)', reference: 'var(--reference)',
  };

  const listEl   = document.getElementById('list');
  const countEl  = document.getElementById('count');
  const searchEl = document.getElementById('search');
  const savedEl  = document.getElementById('saved');
  const toolbarEl = document.getElementById('toolbar');
  const resetEl   = document.getElementById('reset');
  const cMemEl    = document.getElementById('cMem');
  const cSchedEl  = document.getElementById('cSched');
  const tabMem    = document.getElementById('tabMem');
  const tabSched  = document.getElementById('tabSched');

  let searchTimer = null;
  let mode = 'memories';  // 'memories' | 'scheduled'

  function flashSaved() {
    savedEl.classList.add('show');
    setTimeout(() => savedEl.classList.remove('show'), 900);
  }

  function impPips(importance) {
    // 0..1 → 4 pips
    const n = Math.round((importance || 0) * 4);
    let html = '<span class="imp">';
    for (let i = 0; i < 4; i++) {
      html += `<span class="pip${i < n ? ' on' : ''}"></span>`;
    }
    return html + '</span>';
  }

  function render(memories) {
    cMemEl.textContent = memories.length || '';
    countEl.textContent = mode !== 'memories' ? '' : (memories.length
      ? `${memories.length} ${memories.length === 1 ? 'memory' : 'memories'}`
      : '');

    if (!memories.length) {
      listEl.innerHTML =
        '<div class="empty">No memories yet.<br>' +
        'Violet learns durable facts as you talk to her.</div>';
      return;
    }

    listEl.innerHTML = '';
    for (const m of memories) {
      const item = document.createElement('div');
      item.className = 'item';

      const rail = document.createElement('div');
      rail.className = 'rail';
      rail.style.background = COLOR[m.type] || 'var(--muted)';

      const body = document.createElement('div');
      body.className = 'body';

      const content = document.createElement('div');
      content.className = 'content';
      content.contentEditable = 'true';
      content.spellcheck = false;
      content.textContent = m.content;
      content.dataset.orig = m.content;
      content.addEventListener('blur', async () => {
        const val = content.textContent.trim();
        if (!val || val === content.dataset.orig) {
          content.textContent = content.dataset.orig;
          return;
        }
        await window.memoryApi.update(m.id, { content: val });
        content.dataset.orig = val;
        flashSaved();
      });

      const meta = document.createElement('div');
      meta.className = 'meta';

      const sel = document.createElement('select');
      sel.className = 'type';
      for (const t of TYPES) {
        const o = document.createElement('option');
        o.value = t; o.textContent = t;
        if (t === m.type) o.selected = true;
        sel.appendChild(o);
      }
      sel.style.color = COLOR[m.type] || 'var(--muted)';
      sel.addEventListener('change', async () => {
        await window.memoryApi.update(m.id, { type: sel.value });
        sel.style.color = COLOR[sel.value] || 'var(--muted)';
        rail.style.background = COLOR[sel.value] || 'var(--muted)';
        flashSaved();
      });

      const imp = document.createElement('span');
      imp.innerHTML = impPips(m.importance);

      meta.appendChild(sel);
      meta.appendChild(imp);
      if (m.source) {
        const src = document.createElement('span');
        src.className = 'src';
        src.textContent = m.source;
        meta.appendChild(src);
      }

      body.appendChild(content);
      body.appendChild(meta);

      const del = document.createElement('div');
      del.className = 'del';
      del.textContent = '🗑';
      del.title = 'Delete';
      del.addEventListener('click', async () => {
        await window.memoryApi.remove(m.id);
        item.remove();
        load(); // refresh count
      });

      item.appendChild(rail);
      item.appendChild(body);
      item.appendChild(del);
      listEl.appendChild(item);
    }
  }

  async function load() {
    const data = await window.memoryApi.list();
    render((data && data.memories) || []);
  }

  // ── Scheduled tasks ──────────────────────────────────────────────

  function renderEvents(events) {
    cSchedEl.textContent = events.length || '';
    if (mode === 'scheduled') {
      countEl.textContent = events.length
        ? `${events.length} ${events.length === 1 ? 'task' : 'tasks'}`
        : '';
    }

    if (!events.length) {
      listEl.innerHTML =
        '<div class="empty">Nothing scheduled.<br>' +
        'Tell Violet about a meeting or ask her to remind you — ' +
        'it shows up here.</div>';
      return;
    }

    listEl.innerHTML = '';
    for (const e of events) {
      const item = document.createElement('div');
      item.className = 'item';

      const rail = document.createElement('div');
      rail.className = 'rail';
      rail.style.background = e.kind === 'reminder'
        ? 'var(--amber)' : 'var(--feedback)';

      const body = document.createElement('div');
      body.className = 'body';

      const title = document.createElement('div');
      title.className = 'ev-title';
      title.textContent = e.title;

      const meta = document.createElement('div');
      meta.className = 'ev-meta';

      const kind = document.createElement('span');
      kind.className = `kind ${e.kind === 'reminder' ? 'reminder' : 'event'}`;
      kind.textContent = e.kind === 'reminder' ? 'Reminder' : 'Event';

      const when = document.createElement('span');
      when.className = 'ev-when';
      when.innerHTML = `${e.when}<span class="in">${e.in || ''}</span>`;

      meta.appendChild(kind);
      meta.appendChild(when);
      body.appendChild(title);
      body.appendChild(meta);

      const del = document.createElement('div');
      del.className = 'del';
      del.textContent = '🗑';
      del.title = 'Remove from schedule';
      del.addEventListener('click', async () => {
        await window.memoryApi.cancelEvent(e.id);
        item.remove();
        loadEvents(); // refresh count
      });

      item.appendChild(rail);
      item.appendChild(body);
      item.appendChild(del);
      listEl.appendChild(item);
    }
  }

  async function loadEvents() {
    const data = await window.memoryApi.events();
    renderEvents((data && data.events) || []);
  }

  function setMode(next) {
    mode = next;
    const sched = mode === 'scheduled';
    tabMem.classList.toggle('active', !sched);
    tabSched.classList.toggle('active', sched);
    toolbarEl.style.display = sched ? 'none' : '';
    resetEl.style.display   = sched ? 'none' : '';
    searchEl.value = '';
    if (sched) loadEvents(); else load();
  }

  tabMem.addEventListener('click', () => setMode('memories'));
  tabSched.addEventListener('click', () => setMode('scheduled'));

  async function doSearch(q) {
    if (!q.trim()) { load(); return; }
    const data = await window.memoryApi.search(q);
    render((data && data.results) || []);
  }

  searchEl.addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => doSearch(searchEl.value), 250);
  });

  document.getElementById('refresh').addEventListener('click', () => {
    searchEl.value = '';
    if (mode === 'scheduled') loadEvents(); else load();
  });

  // Prime the Scheduled badge count on open without leaving the memories pane.
  async function primeSchedCount() {
    const data = await window.memoryApi.events();
    cSchedEl.textContent = ((data && data.events) || []).length || '';
  }

  document.getElementById('reset').addEventListener('click', async () => {
    if (!confirm('Erase ALL of Violet\'s memories? This cannot be undone.')) return;
    await window.memoryApi.reset();
    searchEl.value = '';
    load();
  });

  document.getElementById('close').addEventListener('click', () => {
    window.memoryApi.close();
  });

  load();
  primeSchedCount();
</script>
</body>
</html>

# Persona Avatar — backend stack.
#
# MVP: one service (api). Sibling services (tts, rag, stt) will
# be added as separate entries on this same compose file when
# they become needed. Frontend runs OUTSIDE compose during dev
# (Vite at :5173) and talks to backend via CORS-allowed WebSocket.

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: persona_api
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      # mount source for live reload during dev. remove for prod.
      - ./backend:/app
      # single source of truth for agent identity (name, personality,
      # user-facing strings). read-only so the backend treats it as
      # immutable config, not data.
      - ./config:/app/config:ro
    restart: unless-stopped
    networks:
      - persona_net

  # Phase 2.B — speech-to-text sibling. Whisper "tiny" int8 on CPU,
  # wrapped behind a tiny FastAPI shim. The renderer's MediaRecorder
  # POSTs WebM/Opus blobs to /transcribe and we hand the transcript
  # to the api service via the existing /chat/ws path (in-renderer
  # plumbing, not container-to-container — the api never sees us).
  speech:
    build:
      context: ./speech
      dockerfile: Dockerfile
    container_name: persona_speech
    ports:
      - "8002:8002"
    volumes:
      # live reload during dev. remove for prod.
      - ./speech:/app
      # Persist the Whisper model cache across rebuilds. Without
      # this, every `docker compose build --no-cache` would re-
      # download the ~75MB weights at first /transcribe call.
      - whisper_cache:/root/.cache/huggingface
    restart: unless-stopped
    networks:
      - persona_net

  # Phase 2.B Wave 2 — wake-word sibling. openwakeword ONNX models
  # run on CPU. The renderer streams 16 kHz mono Int16 PCM into the
  # /ws endpoint continuously; the container emits a JSON event
  # whenever a keyword scores above the detection threshold. Picovoice
  # Porcupine would have been the obvious pick but their personal-
  # account access went away in late 2024.
  wake:
    build:
      context: ./wake
      dockerfile: Dockerfile
    container_name: persona_wake
    ports:
      - "8003:8003"
    volumes:
      # live reload during dev. remove for prod.
      - ./wake:/app
    restart: unless-stopped
    networks:
      - persona_net

networks:
  persona_net:
    driver: bridge

volumes:
  whisper_cache:
